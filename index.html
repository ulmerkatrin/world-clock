<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css">
    <title>World Clock</title>
</head>
<body>
    <div class="container"></div>
        <h1>World Clock</h1>

        <select>
            <option value="">Select a city</option>
            <option value="">New York</option>
            <option value="">Tokyo</option>
            <option value="">Honolulu</option>
        </select>
        
        <div class="city">
        <h2>Honolulu 🌸</h2>
            <div class="date">May 12th 2026</div>
            <div class="time">7:53pm</div>
        </div>
        <div class="city">
            <h2>Tokyo ⛩️</h2>
            <div class="date">May 12th 2026</div>
            <div class="time">7:53pm</div>
        </div>
        <div class="city">
            <h2>New York 🗽</h2>
            <div class="date">May 12th 2026</div>
            <div class="time">7:53pm</div>
        </div>
    </div>
    <footer>Made with ❤️ by <a href="https://github.com/ulmerkatrin" target="_blank">Katrin Ulmer</a> 👩‍💻 and is open sourced on <a href="https://github.com/ulmerkatrin/world-clock" target="_blank">Github</a> and hosted on <a href="https://itsfiveoclocksomewhere.netlify.app/" target="_blank">Netlify</a> </footer>
</body>
<script src="src/index.js"></script>
</html>

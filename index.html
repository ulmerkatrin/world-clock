<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.min.js"></script>
    <title>World Clock</title>
</head>
<body>
    <div class="container"></div>
        <h1>World Clock</h1>

        <select id="city">
            <option value="">Select a city</option>
            <option value="current">My current location</option>
            <option value="America/New_York">New York</option>
            <option value="Asia/Tokyo">Tokyo</option>
            <option value="Pacific/Honolulu">Honolulu</option>
        </select>
        
        <div id="cities">
        <div class="city" id="honolulu">
        <h2>Honolulu 🌸</h2>
            <div class="date">May 12th 2026</div>
            <div class="time">7:53pm</div>
        </div>
        <div class="city" id="tokyo">
            <h2>Tokyo ⛩️</h2>
            <div class="date">May 12th 2026</div>
            <div class="time">7:53pm</div>
        </div>
        <div class="city" id="new-york">
            <h2>New York 🗽</h2>
            <div class="date">May 12th 2026</div>
            <div class="time">7:53pm</div>
        </div>
        </div>
    </div>
    <footer>Made with ❤️ by <a href="https://github.com/ulmerkatrin" target="_blank">Katrin Ulmer</a> 👩‍💻 and is open sourced on <a href="https://github.com/ulmerkatrin/world-clock" target="_blank">Github</a> and hosted on <a href="https://itsfiveoclocksomewhere.netlify.app/" target="_blank">Netlify</a> </footer>
</body>
<script src="src/index.js"></script>
</html>
